<script>
    const API = "https://hrp3fqujbvst7sx5757gs3ltqq0xeptm.lambda-url.us-east-1.on.aws/";

    async function update() {
        try {
            // Chamada ultra-limpa para não assustar o navegador do celular
            const response = await fetch(API);
            const data = await response.json();
            const item = Array.isArray(data) ? data[0] : data;

            if (item) {
                // 1. Atualiza o Saldo (Potencial)
                const valor = item.potencial || 1658.57;
                document.getElementById('saldo').innerText = "R$ " + Number(valor).toLocaleString('pt-BR',{minimumFractionDigits:2});
                
                // 2. Atualiza o Invasor (Alphabet, Meta, etc)
                if (item.nome_invasor && item.nome_invasor !== "Aguardando Captura...") {
                    document.getElementById('nome-invasor').innerText = item.nome_invasor.toUpperCase();
                    document.getElementById('ip-invasor').innerText = "ORIGEM: " + (item.ip_invasor || "IDENTIFICADO");
                }

                // 3. Atualiza o Status para VERDE
                document.getElementById('status').innerText = "SINC: " + new Date().toLocaleTimeString() + " [LIVE]";
                document.getElementById('status').style.color = "#2ecc71";
            }
        } catch(e) {
            // Se der erro, ele avisa, mas tenta de novo em 5 segundos
            document.getElementById('status').innerText = "SINCRONIZANDO...";
            document.getElementById('status').style.color = "#f1c40f";
        }
    }

    // Intervalo de 5 segundos para bater na AWS
    setInterval(update, 5000);
    update();
</script>
