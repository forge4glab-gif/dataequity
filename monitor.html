<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATAEQUITY MONITOR</title>
</head>
<body style="background:#000;color:#2ecc71;font-family:monospace;padding:20px;text-align:center;">
    <h3 style="border-bottom:2px solid #2ecc71;padding-bottom:10px;">FORGE.4G.LAB // AUDITORIA</h3>
    <div style="background:#111;padding:20px;border-radius:10px;border:1px solid #333;margin-bottom:20px;">
        <small style="color:#888;">POTENCIAL TOTAL ACUMULADO</small>
        <div id="saldo" style="font-size:35px;font-weight:bold;color:#fff;">R$ 0,00</div>
    </div>
    <div id="status" style="font-size:11px;color:#f1c40f;">CONECTANDO À AWS...</div>
    <div id="lista" style="text-align:left;margin-top:20px;"></div>

    <script>
        const API = "https://hrp3fqujbvst7sx5757gs3ltqq0xeptm.lambda-url.us-east-1.on.aws/";
        async function update() {
            try {
                const res = await fetch(API + '?t=' + Date.now());
                const data = await res.json();
                const item = Array.isArray(data) ? data[0] : data;
                if (item) {
                    document.getElementById('saldo').innerText = "R$ " + Number(item.potencial).toLocaleString('pt-BR',{minimumFractionDigits:2});
                    document.getElementById('status').innerText = "SINCRONIZADO: " + new Date().toLocaleTimeString();
                    document.getElementById('status').style.color = "#2ecc71";
                }
            } catch(e) {
                document.getElementById('status').innerText = "ERRO: SEM INTERNET NO CELULAR";
                document.getElementById('status').style.color = "red";
            }
        }
        setInterval(update, 4000);
        update();
    </script>
</body>
</html>
