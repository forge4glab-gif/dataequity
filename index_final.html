<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DataEquity System v4.0 | AUDITORIA</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; }
        .container { border: 1px solid #00ff00; padding: 20px; max-width: 600px; margin: 50px auto; box-shadow: 0 0 10px #00ff00; }
        .header { border-bottom: 1px solid #00ff00; padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; font-weight: bold; }
        .saldo-box { font-size: 3em; text-align: center; margin: 20px 0; }
        .log-box { font-size: 0.8em; color: #008800; height: 100px; overflow: hidden; border-top: 1px solid #004400; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Soberania Digital - Monitoramento Local</div>
        <div class="saldo-box" id="saldo">R$ 115.000,00</div>
        <div class="log-box" id="logs">Sincronizado com APK 4.0.2...<br>Aguardando pulso de R$ 0,08...</div>
    </div>
    <script>
        async function refresh() {
            try {
                const res = await fetch('data.json?nocache=' + Date.now());
                const data = await res.json();
                document.getElementById('saldo').innerText = 'R$ ' + data.saldo.toLocaleString('pt-BR', {minimumFractionDigits: 2});
                if(data.nexo) {
                    const log = document.getElementById('logs');
                    log.innerHTML = "Pulso recebido: " + data.nexo + " | Status: OK<br>" + log.innerHTML;
                }
            } catch(e) { }
        }
        setInterval(refresh, 1000);
    </script>
</body>
</html>
